<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TradePro Photo Annotation Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #071120;
            --bg-2: #0b1730;
            --panel: #101c36;
            --accent: #d2a44b;
            --text: #eff4ff;
            --muted: #9aabc9;
            --safe-top: env(safe-area-inset-top);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: calc(var(--safe-top) + 15px) 20px 15px;
            background: var(--bg-2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        canvas {
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            touch-action: none;
        }
        .toolbox {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 28, 54, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .tool {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: var(--muted);
        }
        .tool.active {
            background: var(--accent);
            color: #000;
        }
        .color-picker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-weight: 700; color: var(--accent)">MARKUP TOOL</div>
        <div style="display: flex; gap: 10px;">
            <button onclick="clearCanvas()" style="background: none; border: 1px solid var(--muted); color: var(--muted); padding: 5px 12px; border-radius: 5px; cursor: pointer;">Reset</button>
            <button onclick="saveAnnotation()" style="background: var(--accent); border: none; color: #000; padding: 5px 15px; border-radius: 5px; font-weight: 600; cursor: pointer;">Save</button>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="annotationCanvas"></canvas>
    </div>

    <div class="toolbox">
        <div class="tool active" onclick="setTool('pen')" id="tool-pen"><i class="fas fa-pen"></i></div>
        <div class="tool" onclick="setTool('arrow')" id="tool-arrow"><i class="fas fa-long-arrow-alt-up" style="transform: rotate(45deg)"></i></div>
        <div class="tool" onclick="setTool('rect')" id="tool-rect"><i class="far fa-square"></i></div>
        <div class="tool" onclick="setTool('circle')" id="tool-circle"><i class="far fa-circle"></i></div>
        <div class="tool" onclick="setTool('text')" id="tool-text"><i class="fas fa-font"></i></div>
        <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 5px;"></div>
        <input type="color" id="colorPicker" value="#ff0000" class="color-picker">
    </div>

    <script>
        const canvas = document.getElementById('annotationCanvas');
        const ctx = canvas.getContext('2d');
        let currentTool = 'pen';
        let isDrawing = false;
        let startX, startY;
        let snapshot;

        // Initialize canvas with image if provided
        window.onload = () => {
            canvas.width = window.innerWidth * 0.9;
            canvas.height = window.innerHeight * 0.7;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add placeholder image text
            ctx.fillStyle = '#eee';
            ctx.font = '24px Inter';
            ctx.textAlign = 'center';
            ctx.fillText('UPLOAD PHOTO TO MARKUP', canvas.width/2, canvas.height/2);
            
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        };

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
            document.getElementById('tool-' + tool).classList.add('active');
        }

        canvas.onmousedown = (e) => {
            isDrawing = true;
            startX = e.offsetX;
            startY = e.offsetY;
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = document.getElementById('colorPicker').value;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            if(currentTool === 'pen') {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
            }
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing) return;
            if (currentTool !== 'pen') ctx.putImageData(snapshot, 0, 0);
            
            const x = e.offsetX;
            const y = e.offsetY;

            if (currentTool === 'pen') {
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if (currentTool === 'arrow') {
                drawArrow(startX, startY, x, y);
            } else if (currentTool === 'rect') {
                ctx.strokeRect(startX, startY, x - startX, y - startY);
            } else if (currentTool === 'circle') {
                ctx.beginPath();
                let r = Math.sqrt(Math.pow(startX - x, 2) + Math.pow(startY - y, 2));
                ctx.arc(startX, startY, r, 0, 2 * Math.PI);
                ctx.stroke();
            }
        };

        canvas.onmouseup = () => isDrawing = false;

        function drawArrow(fromx, fromy, tox, toy) {
            const headlen = 15;
            const angle = Math.atan2(toy - fromy, tox - fromx);
            ctx.beginPath();
            ctx.moveTo(fromx, fromy);
            ctx.lineTo(tox, toy);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(tox, toy);
            ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fill();
        }

        function clearCanvas() {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function saveAnnotation() {
            alert('Annotation saved to project documentation');
        }
    </script>
</body>
</html>
