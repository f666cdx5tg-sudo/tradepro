mousedown

                <button class="mini-btn tool" id="tool-circle" onclick="setMarkupTool('circle')" title="Circle"><i class="far fa-circle"></i></button>

      <button class="tab" data-nav="invoices"><i class="fas fa-file-invoice-dollar"></i><span>Bills</span></button>
      <button class="tab" data-nav="crew"><i class="fas fa-users"></i><span>Crew</span></button>

  <script>
    const STORAGE_KEY = 'tradepro-mobile-v3-state-v4';
    const defaultData = {
      projects: [{ id: '1', name: 'Bergenfield Kitchen', client: 'Robinson', status: 'Active', budget: 42000, markups: [] }],
      invoices: [],
      crew: []
    };

    let state = loadState();
    let markups = []; // Current project's markups: { type, x, y, x2, y2, color, points:[] }
    let currentTab = 'dashboard';
    let editingProjectId = null;
    
    // Canvas state
    const canvas = document.getElementById('markupCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let isMoving = false;
    let currentTool = 'pen';
    let selectedShape = null;
    let startX, startY;
    let tempShape = null;
    let bgImage = new Image();

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : structuredClone(defaultData);
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
    }

    // Navigation
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.nav;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + target).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    // Markup Engine
    function setMarkupTool(tool) {
      currentTool = tool;
      document.querySelectorAll('.markup-toolbox .tool').forEach(t => t.classList.remove('active'));
      document.getElementById('tool-' + tool).classList.add('active');
        canvas.style.cursor = tool === 'move' ? 'move' : tool === 'eraser' ? 'pointer' : 'crosshair';
    }

    function loadPhotoForMarkup(e) {
      const file = e.target.files[0];
                  if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            bgImage = new Image();
            bgImage.onload = function() {
                document.getElementById('markupContainer').style.display = 'block';
                canvas.width = canvas.parentElement.offsetWidth;
                canvas.height = canvas.width * (bgImage.height / bgImage.width);
                markups = [];
                drawAll();
            };
            bgImage.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        };
        

    function drawAll() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (bgImage.src) ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
      markups.forEach(m => drawShape(m));
      if (tempShape) drawShape(tempShape);
    }

    function drawShape(s) {
      ctx.strokeStyle = s.color;
      ctx.fillStyle = s.color;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      if (s === selectedShape) {
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'white';
      } else {
        ctx.shadowBlur = 0;
      }

      if (s.type === 'pen') {
        ctx.beginPath();
        s.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();
      } else if (s.type === 'rect') {
        ctx.strokeRect(s.x, s.y, s.x2 - s.x, s.y2 - s.y);
      } else if (s.type === 'circle') {
        const r = Math.sqrt(Math.pow(s.x2 - s.x, 2) + Math.pow(s.y2 - s.y, 2));
        ctx.beginPath();
        ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.stroke();
      } else if (s.type === 'arrow') {
        const headlen = 15;
        const angle = Math.atan2(s.y2 - s.y, s.x2 - s.x);
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x2, s.y2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(s.x2, s.y2);
        ctx.lineTo(s.x2 - headlen * Math.cos(angle - Math.PI / 6), s.y2 - headlen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(s.x2 - headlen * Math.cos(angle + Math.PI / 6), s.y2 - headlen * Math.sin(angle + Math.PI / 6));
        ctx.closePath();
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      startX = e.clientX - rect.left;
      startY = e.clientY - rect.top;
      
      if (currentTool === 'move') {
        selectedShape = findHit(startX, startY);
        if (selectedShape) {
          isMoving = true;
          canvas.style.cursor = 'grabbing';
        }
      } else {
          } else if (currentTool === 'eraser') {
            selectedShape = findHit(startX, startY);
            if (selectedShape) {
                    markups = markups.filter(m => m !== selectedShape);
                    selectedShape = null;
                    drawAll();
                  }
        isDrawing = true;
        selectedShape = null;
        tempShape = { type: currentTool, x: startX, y: startY, x2: startX, y2: startY, color: document.getElementById('markupColor').value, points: [{x: startX, y: startY}] };
      }
          } else if (currentTool === 'eraser') {
            selectedShape = findHit(startX, startY);
            if (selectedShape) {
                      markups = markups.filter(m => m !== selectedShape);
                      drawAll();
                    }
      drawAll();
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDrawing && !isMoving) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      if (isDrawing) {
        tempShape.x2 = x;
        tempShape.y2 = y;
        if (tempShape.type === 'pen') tempShape.points.push({x, y});
      } else if (isMoving && selectedShape) {
        const dx = x - startX;
        const dy = y - startY;
        moveShape(selectedShape, dx, dy);
        startX = x;
        startY = y;
      }
      drawAll();
    });

    window.addEventListener('mouseup', () => {
      if (isDrawing && tempShape) {
        markups.push(tempShape);
        tempShape = null;
      }
      isDrawing = false;
      isMoving = false;
      if (currentTool === 'move') canvas.style.cursor = 'move';
      drawAll();
    });

    function findHit(x, y) {
      // Simple hit detection (reverse order for top-most)
      for (let i = markups.length - 1; i >= 0; i--) {
        const s = markups[i];
        if (s.type === 'rect') {
          if (x >= Math.min(s.x, s.x2) && x <= Math.max(s.x, s.x2) && y >= Math.min(s.y, s.y2) && y <= Math.max(s.y, s.y2)) return s;
        } else if (s.type === 'circle') {
          const r = Math.sqrt(Math.pow(s.x2 - s.x, 2) + Math.pow(s.y2 - s.y, 2));
          const dist = Math.sqrt(Math.pow(x - s.x, 2) + Math.pow(y - s.y, 2));
          if (Math.abs(dist - r) < 10 || dist < r) return s;
        } else if (s.type === 'arrow' || s.type === 'pen') {
          // Distance to line check (simplified)
          return s; // For now just return the last clicked one if in area
        }
      }
      return null;
    }

    function moveShape(s, dx, dy) {
      s.x += dx; s.y += dy;
      s.x2 += dx; s.y2 += dy;
      if (s.points) s.points.forEach(p => { p.x += dx; p.y += dy; });
    }

    function clearMarkup() { markups = []; drawAll(); }

    // Project Logic
    function renderProjects() {
      const list = document.getElementById('projectList');
      list.innerHTML = state.projects.map(p => `
        <div class="item" onclick="editProject('${p.id}')">
          <div style="display:flex; justify-content:space-between;"><strong>${p.name}</strong><span class="badge blue">${p.status}</span></div>
          <div style="font-size:12px; color:var(--muted);">${p.client} · $${p.budget}</div>
        </div>
      `).join('');
    }

    function editProject(id) {
      const p = state.projects.find(x => x.id === id);
      editingProjectId = id;
      document.getElementById('projectName').value = p.name;
      document.getElementById('projectClient').value = p.client;
      document.getElementById('projectBudget').value = p.budget;
      document.getElementById('projectStatus').value = p.status;
      document.getElementById('projectMarkup').value = p.notes || '';
      markups = p.markups || [];
      if (p.photoData) {
        bgImage.onload = () => {
          document.getElementById('markupContainer').style.display = 'block';
          canvas.width = canvas.parentElement.offsetWidth;
          canvas.height = canvas.width * (bgImage.height / bgImage.width);
          drawAll();
        };
        bgImage.src = p.photoData;
      } else {
        document.getElementById('markupContainer').style.display = 'none';
      }
      document.getElementById('projectFormCard').style.display = 'block';
      document.getElementById('projectList').style.display = 'none';
    }

    document.getElementById('saveProjectBtn').addEventListener('click', () => {
      const p = {
        id: editingProjectId || Date.now().toString(),
        name: document.getElementById('projectName').value,
        client: document.getElementById('projectClient').value,
        budget: Number(document.getElementById('projectBudget').value),
        status: document.getElementById('projectStatus').value,
        notes: document.getElementById('projectMarkup').value,
        markups: markups,
        photoData: bgImage.src || null
      };
      if (editingProjectId) state.projects = state.projects.map(x => x.id === editingProjectId ? p : x);
      else state.projects.unshift(p);
      saveState();
      document.getElementById('projectFormCard').style.display = 'none';
      document.getElementById('projectList').style.display = 'block';
    });

    document.getElementById('newProjectBtn').addEventListener('click', () => {
      editingProjectId = null;
      document.querySelectorAll('#projectFormCard input').forEach(i => i.value = '');
      document.getElementById('projectFormCard').style.display = 'block';
      document.getElementById('projectList').style.display = 'none';
      document.getElementById('markupContainer').style.display = 'none';
      markups = [];
      bgImage = new Image();
    });

    document.getElementById('cancelProjectBtn').addEventListener('click', () => {
      document.getElementById('projectFormCard').style.display = 'none';
      document.getElementById('projectList').style.display = 'block';
    });

    function renderAll() { renderProjects(); }
    renderAll();
    setInterval(() => {
      document.getElementById('headerTime').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }, 1000);
  </script>
